[pytest]
# 仓库根目录运行；pythonpath 使 `import backend.*` 可用
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# 与 CI 一致：显式指定目录，避免误收集 backend/agent/scripts
testpaths =
    backend/tests
    backend/agent/tests
    tests
markers =
    phase0: Phase 0 state-closure regression — run with -m phase0
    integration: tests that require a live database (TEST_DATABASE_URL)
filterwarnings =
    ignore::DeprecationWarning
