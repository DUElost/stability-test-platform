ansible_become: "{{ agent_require_become | default(true) }}"
ansible_become_method: sudo
ansible_become_password: "{{ ansible_password }}"

agent_check_strict: true
agent_status_require_active: true

# 开发环境可在执行时用 -e agent_api_url=http://<ip>:8000 临时覆盖。
agent_api_url: "http://172.21.10.25:8000"
agent_install_dir: "/opt/stability-test-agent"
agent_service_name: "stability-test-agent"
agent_remote_tmp_dir: "/tmp/stability-test-agent-ansible"
agent_user: "android"
agent_group: "android"
agent_auto_register_host: false
agent_poll_interval: 10
agent_adb_path: "adb"
agent_log_level: "INFO"
agent_health_log_tail_lines: 40
agent_agentctl_path: "{{ agent_install_dir }}/agentctl"
agent_source_dir: "{{ playbook_dir }}/../../../backend/agent"

# Agent-Backend 双向认证密钥，默认所有 Linux Agent 共用 Backend .env 中的 AGENT_SECRET。
# 覆盖优先级：有效 vault_agent_secret > 本机环境变量 AGENT_SECRET > backend/.env。
# 这样测试环境无需手动传 vault，也避免把真实 secret 写入被 git 跟踪的文件。
agent_secret_placeholder_values:
  - ""
  - "REPLACE_WITH_VAULTED_SECRET_AT_LEAST_16_CHARS"

agent_secret_from_vault: "{{ vault_agent_secret | default('', true) | trim }}"
agent_secret_from_env: "{{ lookup('ansible.builtin.env', 'AGENT_SECRET') | default('', true) | trim }}"
agent_secret_from_backend_env: >-
  {{
    lookup(
      'ansible.builtin.ini',
      'AGENT_SECRET type=properties file=' ~ inventory_dir ~ '/../../backend/.env',
      errors='ignore'
    ) | default('', true) | trim
  }}
agent_secret: >-
  {{
    agent_secret_from_vault
    if agent_secret_from_vault not in agent_secret_placeholder_values
    else (
      agent_secret_from_env
      if agent_secret_from_env not in agent_secret_placeholder_values
      else agent_secret_from_backend_env
    )
  }}
