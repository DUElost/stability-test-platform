- name: Update linux agent host code
  hosts: linux_hosts
  gather_facts: false
  serial: "20%"
  max_fail_percentage: 0
  any_errors_fatal: true

  vars:
    agent_backup_dir: "{{ agent_install_dir }}/agent.bak.{{ ansible_date_time.iso8601_basic_short | default(lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ')) }}"

  pre_tasks:
    - name: Validate agent_secret is provided via vault
      ansible.builtin.assert:
        that:
          - agent_secret is defined
          - agent_secret | length >= 16
          - agent_secret != "change-me-in-production"
          - agent_secret != "REPLACE_WITH_VAULTED_SECRET_AT_LEAST_16_CHARS"
        fail_msg: >-
          agent_secret 未注入或仍为占位值。请运行
          `ansible-vault edit tools/ansible/group_vars/linux_hosts.vault.yml`
          填入真实 AGENT_SECRET（至少 16 字符），并使用
          `ANSIBLE_VAULT_PASSWORD_FILE` 注入 vault 密码后重试。

    - name: Load agent_install_excludes from role defaults
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../roles/agent_deploy/defaults/main.yml"

  tasks:
    - name: Ensure remote temp directory exists
      become: true
      ansible.builtin.file:
        path: "{{ agent_remote_tmp_dir }}"
        state: directory
        owner: "{{ agent_user }}"
        group: "{{ agent_group }}"
        mode: "0755"

    - name: Check install directory exists before update
      become: true
      ansible.builtin.stat:
        path: "{{ agent_install_dir }}"
      register: agent_install_dir_stat

    - name: Fail when target host is not installed
      ansible.builtin.assert:
        that:
          - agent_install_dir_stat.stat.exists
        fail_msg: "Agent is not installed on {{ inventory_hostname }}. Run install_agent.yml first."

    - name: Check environment file exists before update
      become: true
      ansible.builtin.stat:
        path: "{{ agent_install_dir }}/.env"
      register: agent_env_file_stat

    - name: Fail when environment file is missing
      ansible.builtin.assert:
        that:
          - agent_env_file_stat.stat.exists
        fail_msg: "Agent environment file is missing on {{ inventory_hostname }}. Run install_agent.yml first."

    - name: Clean stale files from remote temp directory
      become: true
      ansible.builtin.file:
        path: "{{ agent_remote_tmp_dir }}"
        state: absent

    - name: Recreate remote temp directory
      become: true
      ansible.builtin.file:
        path: "{{ agent_remote_tmp_dir }}"
        state: directory
        owner: "{{ agent_user }}"
        group: "{{ agent_group }}"
        mode: "0755"

    - name: Copy latest agent source tree to remote temp directory
      ansible.builtin.copy:
        src: "{{ agent_source_dir }}/"
        dest: "{{ agent_remote_tmp_dir }}/"
        mode: preserve

    - name: Normalize line endings in staged source tree
      become: true
      ansible.builtin.shell: |
        find "{{ agent_remote_tmp_dir }}" -type f \( -name "*.sh" -o -name "*.py" \) -exec sed -i 's/\r$//' {} +
      changed_when: false

    - name: Snapshot current agent directory before sync
      become: true
      ansible.builtin.shell: |
        rsync -a --delete \
          "{{ agent_install_dir }}/agent/" \
          "{{ agent_backup_dir }}/"
      args:
        creates: "{{ agent_backup_dir }}"
      changed_when: true

    - name: Run upgrade with rollback on health failure
      block:
        - name: Sync Python code into installed agent directory
          become: true
          ansible.builtin.shell: |
            rsync -av --delete \
              {% for item in agent_install_excludes %}--exclude='{{ item }}' {% endfor %} \
              "{{ agent_remote_tmp_dir }}/" "{{ agent_install_dir }}/agent/"
          args:
            executable: /bin/bash

        - name: Refresh agentctl command from staged source
          become: true
          ansible.builtin.copy:
            remote_src: true
            src: "{{ agent_remote_tmp_dir }}/agentctl.sh"
            dest: "{{ agent_install_dir }}/agentctl"
            mode: "0755"

        - name: Refresh /usr/local/bin/agentctl symlink
          become: true
          ansible.builtin.file:
            src: "{{ agent_install_dir }}/agentctl"
            dest: "/usr/local/bin/agentctl"
            state: link

        - name: Update API_URL in deployed environment file
          become: true
          ansible.builtin.lineinfile:
            path: "{{ agent_install_dir }}/.env"
            regexp: "^API_URL="
            line: "API_URL={{ agent_api_url }}"
            create: false

        - name: Ensure AGENT_SECRET is set in deployed environment file
          become: true
          ansible.builtin.lineinfile:
            path: "{{ agent_install_dir }}/.env"
            regexp: "^AGENT_SECRET="
            line: "AGENT_SECRET={{ agent_secret }}"
            create: false
          no_log: true

        - name: Repair ownership on install directory
          become: true
          ansible.builtin.file:
            path: "{{ agent_install_dir }}"
            owner: "{{ agent_user }}"
            group: "{{ agent_group }}"
            recurse: true

        - name: Reload systemd and restart service
          become: true
          ansible.builtin.systemd:
            name: "{{ agent_service_name }}"
            state: restarted
            daemon_reload: true

        - name: Verify service is active after restart
          become: true
          ansible.builtin.command: "systemctl is-active {{ agent_service_name }}"
          register: agent_service_after_update
          changed_when: false
          retries: 12
          delay: 5
          until: agent_service_after_update.stdout == "active"

        - name: Run agentctl health after restart
          become: true
          ansible.builtin.command: "{{ agent_agentctl_path }} health"
          register: agent_health_after_update
          changed_when: false
          retries: 6
          delay: 5
          until: agent_health_after_update.rc == 0

      rescue:
        - name: Roll back agent code from snapshot
          become: true
          ansible.builtin.shell: |
            rsync -a --delete \
              "{{ agent_backup_dir }}/" \
              "{{ agent_install_dir }}/agent/"
          changed_when: true

        - name: Restart service after rollback
          become: true
          ansible.builtin.systemd:
            name: "{{ agent_service_name }}"
            state: restarted
            daemon_reload: true

        - name: Tail error log after rollback
          become: true
          ansible.builtin.shell: |
            tail -n {{ agent_health_log_tail_lines }} {{ agent_install_dir }}/logs/agent_error.log
          register: agent_rollback_error_log
          changed_when: false
          failed_when: false

        - name: Fail update batch after rollback
          ansible.builtin.fail:
            msg: >-
              Upgrade failed on {{ inventory_hostname }}; rolled back to
              {{ agent_backup_dir }}.
              error_log_tail={{ agent_rollback_error_log.stdout_lines | default([]) }}

    - name: Prune older agent backup snapshots (keep latest 1)
      become: true
      ansible.builtin.shell: |
        cd "{{ agent_install_dir }}" && \
          ls -1dt agent.bak.* 2>/dev/null | tail -n +2 | xargs -r rm -rf
      changed_when: false

    - name: Tail error log after update
      become: true
      ansible.builtin.shell: |
        tail -n {{ agent_health_log_tail_lines }} {{ agent_install_dir }}/logs/agent_error.log
      register: agent_update_error_log
      changed_when: false
      failed_when: false

    - name: Print update summary
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          api_url: "{{ agent_api_url }}"
          backup_dir: "{{ agent_backup_dir }}"
          health_rc: "{{ agent_health_after_update.rc | default('skipped') }}"
          error_log_tail: "{{ agent_update_error_log.stdout_lines | default([]) }}"
