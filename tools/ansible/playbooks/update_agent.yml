- name: Update linux agent host code
  hosts: linux_hosts
  gather_facts: false
  serial: "20%"
  max_fail_percentage: 0
  any_errors_fatal: true

  vars:
    agent_update_timestamp: "{{ ansible_date_time.iso8601_basic_short | default(lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ')) }}"
    agent_backup_dir: "{{ agent_install_dir }}/agent.bak.{{ agent_update_timestamp }}"
    agent_agentctl_backup_path: "{{ agent_install_dir }}/agentctl.bak.{{ agent_update_timestamp }}"
    agent_service_backup_path: "/etc/systemd/system/{{ agent_service_name }}.service.bak.{{ agent_update_timestamp }}"
    agent_rsync_remote: "{{ ansible_user }}@{{ ansible_host | default(inventory_hostname) }}"
    agent_rsync_ssh_command: >-
      ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
      -o ConnectTimeout={{ ansible_ssh_timeout | default(10) }}
      {% if ansible_port is defined %}-p {{ ansible_port }}{% endif %}

  pre_tasks:
    - name: Validate agent_secret is available
      ansible.builtin.assert:
        that:
          - agent_secret is defined
          - agent_secret | length >= 16
          - agent_secret != "REPLACE_WITH_VAULTED_SECRET_AT_LEAST_16_CHARS"
        fail_msg: >-
          agent_secret 未注入或仍为占位值。请确认本地 backend/.env 中存在
          AGENT_SECRET（至少 16 字符），或通过环境变量 AGENT_SECRET /
          vault_agent_secret 覆盖后重试。

    - name: Load agent_install_excludes from role defaults
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../roles/agent_deploy/defaults/main.yml"

    - name: Freeze update backup timestamp
      ansible.builtin.set_fact:
        agent_update_timestamp: "{{ agent_update_timestamp }}"

    - name: Validate local rsync is available
      delegate_to: localhost
      become: false
      ansible.builtin.command: rsync --version
      changed_when: false

    - name: Validate local sshpass is available for password based hosts
      delegate_to: localhost
      become: false
      ansible.builtin.command: sshpass -V
      changed_when: false
      when: ansible_password is defined and (ansible_password | string | length) > 0

  tasks:
    - name: Check install directory exists before update
      become: true
      ansible.builtin.stat:
        path: "{{ agent_install_dir }}"
      register: agent_install_dir_stat

    - name: Fail when target host is not installed
      ansible.builtin.assert:
        that:
          - agent_install_dir_stat.stat.exists
        fail_msg: "Agent is not installed on {{ inventory_hostname }}. Run install_agent.yml first."

    - name: Check installed agent code directory exists before update
      become: true
      ansible.builtin.stat:
        path: "{{ agent_install_dir }}/agent"
      register: agent_code_dir_stat

    - name: Fail when installed agent code directory is missing
      ansible.builtin.assert:
        that:
          - agent_code_dir_stat.stat.exists
          - agent_code_dir_stat.stat.isdir
        fail_msg: "Agent code directory is missing on {{ inventory_hostname }}. Run install_agent.yml first."

    - name: Check environment file exists before update
      become: true
      ansible.builtin.stat:
        path: "{{ agent_install_dir }}/.env"
      register: agent_env_file_stat

    - name: Fail when environment file is missing
      ansible.builtin.assert:
        that:
          - agent_env_file_stat.stat.exists
        fail_msg: "Agent environment file is missing on {{ inventory_hostname }}. Run install_agent.yml first."

    - name: Capture installed requirements.txt sha before sync
      become: true
      ansible.builtin.command: "sha256sum {{ agent_install_dir }}/agent/requirements.txt"
      register: agent_installed_req_sha_raw
      changed_when: false
      failed_when: false

    - name: Compute staged requirements.txt sha on control plane
      delegate_to: localhost
      become: false
      ansible.builtin.command: "sha256sum {{ agent_source_dir }}/requirements.txt"
      register: agent_staged_req_sha_raw
      changed_when: false
      failed_when: false

    - name: Record requirements.txt sha facts
      ansible.builtin.set_fact:
        agent_installed_req_sha: "{{ (agent_installed_req_sha_raw.stdout | default('')).split(' ')[0] | default('none') }}"
        agent_staged_req_sha: "{{ (agent_staged_req_sha_raw.stdout | default('')).split(' ')[0] | default('none') }}"
        agent_deps_refreshed: false

    - name: Preview agent code changes with rsync dry-run
      delegate_to: localhost
      become: false
      ansible.builtin.shell: |
        set -euo pipefail
        run_rsync() {
          if [ -n "${SSHPASS:-}" ]; then
            sshpass -e rsync "$@"
          else
            rsync "$@"
          fi
        }

        run_rsync -aic --dry-run --delete --delete-excluded --no-owner --no-group --itemize-changes \
          --rsync-path='sudo rsync' \
          -e "{{ agent_rsync_ssh_command }}" \
          {% for item in agent_install_excludes %}--exclude='{{ item }}' \
          {% endfor %}"{{ agent_source_dir }}/" "{{ agent_rsync_remote }}:{{ agent_install_dir }}/agent/"
      args:
        executable: /bin/bash
      environment:
        SSHPASS: "{{ ansible_password | default('') }}"
      register: agent_code_diff
      changed_when: false

    - name: Preview agentctl changes with rsync dry-run
      delegate_to: localhost
      become: false
      ansible.builtin.shell: |
        set -euo pipefail
        run_rsync() {
          if [ -n "${SSHPASS:-}" ]; then
            sshpass -e rsync "$@"
          else
            rsync "$@"
          fi
        }

        run_rsync -aic --dry-run --no-owner --no-group --itemize-changes --chmod=F755 \
          --rsync-path='sudo rsync' \
          -e "{{ agent_rsync_ssh_command }}" \
          "{{ agent_source_dir }}/agentctl.sh" "{{ agent_rsync_remote }}:{{ agent_install_dir }}/agentctl"
      args:
        executable: /bin/bash
      environment:
        SSHPASS: "{{ ansible_password | default('') }}"
      register: agentctl_diff
      changed_when: false

    - name: Preview service unit changes with rsync dry-run
      delegate_to: localhost
      become: false
      ansible.builtin.shell: |
        set -euo pipefail
        run_rsync() {
          if [ -n "${SSHPASS:-}" ]; then
            sshpass -e rsync "$@"
          else
            rsync "$@"
          fi
        }

        run_rsync -aic --dry-run --no-owner --no-group --itemize-changes --chmod=F644 \
          --rsync-path='sudo rsync' \
          -e "{{ agent_rsync_ssh_command }}" \
          "{{ agent_source_dir }}/stability-test-agent.service" "{{ agent_rsync_remote }}:/etc/systemd/system/{{ agent_service_name }}.service"
      args:
        executable: /bin/bash
      environment:
        SSHPASS: "{{ ansible_password | default('') }}"
      register: agent_service_diff
      changed_when: false

    - name: Record rsync change summary
      ansible.builtin.set_fact:
        agent_code_change_lines: "{{ agent_code_diff.stdout_lines | default([]) | reject('equalto', '') | reject('match', '^\\.[^ ]\\s{10}') | reject('match', '^\\.[fd]\\.\\.t\\.\\.\\.\\.\\.\\.\\s') | reject('match', '.*(__pycache__/|\\.pyc$).*') | list }}"
        agentctl_change_lines: "{{ agentctl_diff.stdout_lines | default([]) | reject('equalto', '') | reject('match', '^\\.[^ ]\\s{10}') | list }}"
        agent_service_change_lines: "{{ agent_service_diff.stdout_lines | default([]) | reject('equalto', '') | reject('match', '^\\.[^ ]\\s{10}') | list }}"

    - name: Update API_URL in deployed environment file
      become: true
      ansible.builtin.lineinfile:
        path: "{{ agent_install_dir }}/.env"
        regexp: "^API_URL="
        line: "API_URL={{ agent_api_url }}"
        create: false
      register: agent_api_url_update

    - name: Ensure AGENT_SECRET is set in deployed environment file
      become: true
      ansible.builtin.lineinfile:
        path: "{{ agent_install_dir }}/.env"
        regexp: "^AGENT_SECRET="
        line: "AGENT_SECRET={{ agent_secret }}"
        create: false
      no_log: true
      register: agent_secret_update

    - name: Record environment change summary
      ansible.builtin.set_fact:
        agent_env_changed: "{{ agent_api_url_update.changed or agent_secret_update.changed }}"

    - name: Record restart requirement summary
      ansible.builtin.set_fact:
        agent_update_requires_restart: >-
          {{
            (agent_code_change_lines | length > 0)
            or (agentctl_change_lines | length > 0)
            or (agent_service_change_lines | length > 0)
            or (agent_env_changed | bool)
          }}

    - name: Snapshot current agent directory before sync
      become: true
      ansible.builtin.shell: |
        rsync -a --delete \
          "{{ agent_install_dir }}/agent/" \
          "{{ agent_backup_dir }}/"
      args:
        creates: "{{ agent_backup_dir }}"
      changed_when: true
      when: agent_code_change_lines | length > 0

    - name: Snapshot current agentctl before sync
      become: true
      ansible.builtin.command:
        cmd: "cp -a {{ agent_install_dir }}/agentctl {{ agent_agentctl_backup_path }}"
        creates: "{{ agent_agentctl_backup_path }}"
      when: agentctl_change_lines | length > 0

    - name: Snapshot current service unit before sync
      become: true
      ansible.builtin.command:
        cmd: "cp -a /etc/systemd/system/{{ agent_service_name }}.service {{ agent_service_backup_path }}"
        creates: "{{ agent_service_backup_path }}"
      when: agent_service_change_lines | length > 0

    - name: Run upgrade with rollback on health failure
      block:
        - name: Sync changed agent code into installed agent directory
          delegate_to: localhost
          become: false
          ansible.builtin.shell: |
            set -euo pipefail
            run_rsync() {
              if [ -n "${SSHPASS:-}" ]; then
                sshpass -e rsync "$@"
              else
                rsync "$@"
              fi
            }

            run_rsync -aic --delete --delete-excluded --delay-updates --no-owner --no-group --itemize-changes \
              --rsync-path='sudo rsync' \
              -e "{{ agent_rsync_ssh_command }}" \
              {% for item in agent_install_excludes %}--exclude='{{ item }}' \
              {% endfor %}"{{ agent_source_dir }}/" "{{ agent_rsync_remote }}:{{ agent_install_dir }}/agent/"
          args:
            executable: /bin/bash
          environment:
            SSHPASS: "{{ ansible_password | default('') }}"
          when: agent_code_change_lines | length > 0

        - name: Refresh agentctl command from local source
          delegate_to: localhost
          become: false
          ansible.builtin.shell: |
            set -euo pipefail
            run_rsync() {
              if [ -n "${SSHPASS:-}" ]; then
                sshpass -e rsync "$@"
              else
                rsync "$@"
              fi
            }

            run_rsync -aic --no-owner --no-group --itemize-changes --chmod=F755 \
              --rsync-path='sudo rsync' \
              -e "{{ agent_rsync_ssh_command }}" \
              "{{ agent_source_dir }}/agentctl.sh" "{{ agent_rsync_remote }}:{{ agent_install_dir }}/agentctl"
          args:
            executable: /bin/bash
          environment:
            SSHPASS: "{{ ansible_password | default('') }}"
          when: agentctl_change_lines | length > 0

        - name: Refresh systemd service unit from local source
          delegate_to: localhost
          become: false
          ansible.builtin.shell: |
            set -euo pipefail
            run_rsync() {
              if [ -n "${SSHPASS:-}" ]; then
                sshpass -e rsync "$@"
              else
                rsync "$@"
              fi
            }

            run_rsync -aic --no-owner --no-group --itemize-changes --chmod=F644 \
              --rsync-path='sudo rsync' \
              -e "{{ agent_rsync_ssh_command }}" \
              "{{ agent_source_dir }}/stability-test-agent.service" "{{ agent_rsync_remote }}:/etc/systemd/system/{{ agent_service_name }}.service"
          args:
            executable: /bin/bash
          environment:
            SSHPASS: "{{ ansible_password | default('') }}"
          when: agent_service_change_lines | length > 0

        - name: Refresh /usr/local/bin/agentctl symlink
          become: true
          ansible.builtin.file:
            src: "{{ agent_install_dir }}/agentctl"
            dest: "/usr/local/bin/agentctl"
            state: link
          register: agentctl_symlink_update

        - name: Repair ownership on install directory
          become: true
          ansible.builtin.file:
            path: "{{ agent_install_dir }}"
            owner: "{{ agent_user }}"
            group: "{{ agent_group }}"
            recurse: true
          when: agent_code_change_lines | length > 0 or agentctl_change_lines | length > 0

        - name: Refresh Python dependencies when requirements.txt changed
          become: true
          become_user: "{{ agent_user }}"
          ansible.builtin.command: >-
            {{ agent_install_dir }}/venv/bin/pip install -r {{ agent_install_dir }}/agent/requirements.txt
            -q --disable-pip-version-check
          args:
            chdir: "{{ agent_install_dir }}"
          environment:
            PIP_INDEX_URL: "{{ agent_pip_index_url | default('') }}"
          when: >-
            agent_staged_req_sha is defined
            and agent_installed_req_sha is defined
            and agent_staged_req_sha != 'none'
            and agent_installed_req_sha != agent_staged_req_sha
          register: agent_pip_install_result
          changed_when: true

        - name: Record deps refresh status
          ansible.builtin.set_fact:
            agent_deps_refreshed: "{{ agent_pip_install_result is changed }}"
          when: agent_pip_install_result is defined

        - name: Reload systemd and restart service
          become: true
          ansible.builtin.systemd:
            name: "{{ agent_service_name }}"
            enabled: true
            state: restarted
            daemon_reload: true
          when: agent_update_requires_restart | bool

        - name: Verify service is active after restart
          become: true
          ansible.builtin.command: "systemctl is-active {{ agent_service_name }}"
          register: agent_service_after_update
          changed_when: false
          retries: 12
          delay: 5
          until: agent_service_after_update.stdout == "active"
          when: agent_update_requires_restart | bool

        - name: Run agentctl health after restart
          become: true
          ansible.builtin.command: "{{ agent_agentctl_path }} health"
          register: agent_health_after_update
          changed_when: false
          retries: 6
          delay: 5
          until: agent_health_after_update.rc == 0
          when: agent_update_requires_restart | bool

      rescue:
        - name: Roll back agent code from snapshot
          become: true
          ansible.builtin.shell: |
            rsync -a --delete \
              "{{ agent_backup_dir }}/" \
              "{{ agent_install_dir }}/agent/"
          changed_when: true
          when: agent_code_change_lines | length > 0

        - name: Roll back agentctl from snapshot
          become: true
          ansible.builtin.command:
            cmd: "cp -a {{ agent_agentctl_backup_path }} {{ agent_install_dir }}/agentctl"
          when: agentctl_change_lines | length > 0

        - name: Roll back service unit from snapshot
          become: true
          ansible.builtin.command:
            cmd: "cp -a {{ agent_service_backup_path }} /etc/systemd/system/{{ agent_service_name }}.service"
          when: agent_service_change_lines | length > 0

        - name: Restart service after rollback
          become: true
          ansible.builtin.systemd:
            name: "{{ agent_service_name }}"
            enabled: true
            state: restarted
            daemon_reload: true

        - name: Tail error log after rollback
          become: true
          ansible.builtin.shell: |
            tail -n {{ agent_health_log_tail_lines }} {{ agent_install_dir }}/logs/agent_error.log
          register: agent_rollback_error_log
          changed_when: false
          failed_when: false

        - name: Fail update batch after rollback
          ansible.builtin.fail:
            msg: >-
              Upgrade failed on {{ inventory_hostname }}; rolled back to
              {{ agent_backup_dir }}.
              error_log_tail={{ agent_rollback_error_log.stdout_lines | default([]) }}

    - name: Prune older agent backup snapshots (keep latest 1)
      become: true
      ansible.builtin.shell: |
        cd "{{ agent_install_dir }}" && \
          ls -1dt agent.bak.* 2>/dev/null | tail -n +2 | xargs -r rm -rf && \
          ls -1dt agentctl.bak.* 2>/dev/null | tail -n +2 | xargs -r rm -f && \
          cd /etc/systemd/system && \
          ls -1dt "{{ agent_service_name }}".service.bak.* 2>/dev/null | tail -n +2 | xargs -r rm -f
      changed_when: false

    - name: Tail error log after update
      become: true
      ansible.builtin.shell: |
        tail -n {{ agent_health_log_tail_lines }} {{ agent_install_dir }}/logs/agent_error.log
      register: agent_update_error_log
      changed_when: false
      failed_when: false

    - name: Print update summary
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          api_url: "{{ agent_api_url }}"
          code_change_count: "{{ agent_code_change_lines | default([]) | length }}"
          agentctl_change_count: "{{ agentctl_change_lines | default([]) | length }}"
          service_unit_change_count: "{{ agent_service_change_lines | default([]) | length }}"
          env_changed: "{{ agent_env_changed | default(false) }}"
          deps_refreshed: "{{ agent_deps_refreshed | default(false) }}"
          restart_required: "{{ agent_update_requires_restart | default(false) }}"
          backup_dir: "{{ agent_backup_dir if (agent_code_change_lines | default([]) | length > 0) else 'skipped' }}"
          agentctl_backup: "{{ agent_agentctl_backup_path if (agentctl_change_lines | default([]) | length > 0) else 'skipped' }}"
          service_unit_backup: "{{ agent_service_backup_path if (agent_service_change_lines | default([]) | length > 0) else 'skipped' }}"
          health_rc: "{{ agent_health_after_update.rc | default('skipped') }}"
          error_log_tail: "{{ agent_update_error_log.stdout_lines | default([]) }}"
