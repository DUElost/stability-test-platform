- name: Install linux agent host via phase-a bridge
  hosts: linux_hosts
  gather_facts: false

  pre_tasks:
    - name: Validate agent_secret is available
      ansible.builtin.assert:
        that:
          - agent_secret is defined
          - agent_secret | length >= 16
          - agent_secret != "REPLACE_WITH_VAULTED_SECRET_AT_LEAST_16_CHARS"
        fail_msg: >-
          agent_secret 未注入或仍为占位值。请确认本地 backend/.env 中存在
          AGENT_SECRET（至少 16 字符），或通过环境变量 AGENT_SECRET /
          vault_agent_secret 覆盖后重试。

  tasks:
    - name: Ensure remote temp directory exists
      become: true
      ansible.builtin.file:
        path: "{{ agent_remote_tmp_dir }}"
        state: directory
        owner: "{{ agent_user }}"
        group: "{{ agent_group }}"
        mode: "0755"

    - name: Copy agent source tree to remote temp directory
      ansible.builtin.copy:
        src: "{{ agent_source_dir }}/"
        dest: "{{ agent_remote_tmp_dir }}/"
        mode: preserve

    - name: Normalize line endings in staged source tree
      become: true
      ansible.builtin.shell: |
        find "{{ agent_remote_tmp_dir }}" -type f \( -name "*.sh" -o -name "*.py" \) -exec sed -i 's/\r$//' {} +
      changed_when: false

    - name: Run install script non-interactively
      become: true
      ansible.builtin.shell: |
        printf '%s\n%s\n' '{{ agent_api_url }}' '{{ agent_host_id }}' | bash install_agent.sh
      args:
        chdir: "{{ agent_remote_tmp_dir }}"
        executable: /bin/bash
      environment:
        AGENT_INSTALL_DIR: "{{ agent_install_dir }}"
        AGENT_USER: "{{ agent_user }}"
        AGENT_GROUP: "{{ agent_group }}"
        AGENT_SECRET: "{{ agent_secret }}"
        PIP_INDEX_URL: "{{ agent_pip_index_url | default('') }}"

    - name: Refresh agentctl command from staged source
      become: true
      ansible.builtin.copy:
        remote_src: true
        src: "{{ agent_remote_tmp_dir }}/agentctl.sh"
        dest: "{{ agent_install_dir }}/agentctl"
        mode: "0755"

    - name: Refresh /usr/local/bin/agentctl symlink
      become: true
      ansible.builtin.file:
        src: "{{ agent_install_dir }}/agentctl"
        dest: "/usr/local/bin/agentctl"
        state: link

    - name: Repair ownership on install directory
      become: true
      ansible.builtin.file:
        path: "{{ agent_install_dir }}"
        owner: "{{ agent_user }}"
        group: "{{ agent_group }}"
        recurse: true

    - name: Ensure environment file ownership and mode
      become: true
      ansible.builtin.file:
        path: "{{ agent_install_dir }}/.env"
        owner: "{{ agent_user }}"
        group: "{{ agent_group }}"
        mode: "0640"

    - name: Restart agent service to load updated .env
      become: true
      ansible.builtin.systemd:
        name: "{{ agent_service_name }}"
        enabled: true
        state: restarted
        daemon_reload: true

    - name: Verify service is active after install
      become: true
      ansible.builtin.command: "systemctl is-active {{ agent_service_name }}"
      register: agent_service_after_install
      changed_when: false
      retries: 12
      delay: 5
      until: agent_service_after_install.stdout == "active"

    - name: Run agentctl health after install
      become: true
      ansible.builtin.command: "{{ agent_agentctl_path }} health"
      register: agent_health_after_install
      changed_when: false
      retries: 6
      delay: 5
      until: agent_health_after_install.rc == 0

    - name: Print install summary
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          service_state: "{{ agent_service_after_install.stdout | default('unknown') }}"
          health_rc: "{{ agent_health_after_install.rc | default('skipped') }}"
          api_url: "{{ agent_api_url }}"
          install_dir: "{{ agent_install_dir }}"
