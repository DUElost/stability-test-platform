# Ansible inventory 示例
#
# 真实 inventory.ini 不入仓库（已在仓库根 .gitignore 中排除）。
# 首次使用：
#   cp inventory.example.ini inventory.ini
#   # 然后填入各主机真实 ansible_password（或改用 SSH 公钥认证后删除该字段）。
#
# 推荐分组：
#   - agent_canary：金丝雀主机，先行验证。
#   - agent_prod  ：其余生产主机。
#   - linux_hosts ：以上两组的并集，README 中常用命令默认使用此组。
#
# 灰度发布顺序：
#   ansible-playbook ... --limit agent_canary
#   # 观察 5-10 分钟无异常后再：
#   ansible-playbook ... --limit agent_prod
#
# 凭据轮换提醒：
#   仓库历史中曾包含过明文密码，需运维窗口期统一更新 SSH/sudo 密码并切换到密钥认证。

[linux_hosts:children]
agent_canary
agent_prod

[agent_canary]
172.21.10.36 ansible_host=172.21.10.36 ansible_user=android ansible_password=__SET_LOCALLY__ ansible_ssh_timeout=10
172.21.15.10 ansible_host=172.21.15.10 ansible_user=android ansible_password=__SET_LOCALLY__ ansible_ssh_timeout=10

