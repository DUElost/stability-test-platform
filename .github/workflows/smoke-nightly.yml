# Nightly / manual main-chain smoke.
# - integration-smoke: mock Agent RPC (no real device) — same as CI main-chain step.
# - real-device-smoke: optional; runs seed_and_smoke.py when repository secrets are set.
name: smoke-nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  integration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stability_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stability_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TESTING: "1"
      JWT_SECRET_KEY: "ci-test-secret-key"
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/stability_test"
      TEST_DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/stability_test"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Main-chain integration smoke
        run: >-
          python -m pytest
          backend/tests/integration/test_main_chain_happy_path.py
          backend/tests/test_seed_and_smoke.py
          -v

  real-device-smoke:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && secrets.STP_ADMIN_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Real-device seed_and_smoke
        env:
          STP_ADMIN_PASSWORD: ${{ secrets.STP_ADMIN_PASSWORD }}
          STP_ADMIN_USER: ${{ vars.STP_ADMIN_USER }}
          STP_SMOKE_BACKEND: ${{ vars.STP_SMOKE_BACKEND }}
          STP_SMOKE_HOST_ID: ${{ vars.STP_SMOKE_HOST_ID }}
          STP_SMOKE_DEVICE_ID: ${{ vars.STP_SMOKE_DEVICE_ID }}
        run: |
          python backend/scripts/seed_and_smoke.py \
            --backend "${STP_SMOKE_BACKEND:-http://localhost:8000}" \
            --username "${STP_ADMIN_USER:-admin}" \
            --target-host-id "${STP_SMOKE_HOST_ID:-auto-fdaf1d55e319}" \
            --device-id "${STP_SMOKE_DEVICE_ID:-2429}" \
            --no-hot-update \
            --timeout 600
