name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stability_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stability_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TESTING: "1"
      JWT_SECRET_KEY: "ci-test-secret-key"
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/stability_test"
      TEST_DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/stability_test"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Compile check
        run: python -m compileall backend/ -q
      - name: Run tests
        run: pytest backend/tests/ -v

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t stability-backend .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t stability-frontend .
